name: Daily Enrichment (Satellite)

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without writing to Sheets'
        default: 'false'
      start_date:
        description: 'Inclusive start date (YYYY-MM-DD); blank = all missing'
        required: false
        default: ''
      end_date:
        description: 'Inclusive end date (YYYY-MM-DD); blank = now'
        required: false
        default: ''

# Serialize the enrichment-write path: the scheduled cron and any
# operator-triggered workflow_dispatch must never clear-and-rewrite
# Derived_Daily concurrently, since the intermediate read-back window
# is racy against a second job's write.
concurrency:
  group: enrichment-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements-cron.txt
      - name: Run daily enrichment
        id: enrich
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: |
          set -euo pipefail
          DRY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          START_FLAG=""
          if [ -n "${{ github.event.inputs.start_date }}" ]; then
            START_FLAG="--start-date ${{ github.event.inputs.start_date }}"
          fi
          END_FLAG=""
          if [ -n "${{ github.event.inputs.end_date }}" ]; then
            END_FLAG="--end-date ${{ github.event.inputs.end_date }}"
          fi
          python scripts/backfill_enrichment.py \
            --sources noaa_oisst,mur_sst,ostia,oscar,osi_saf_seaice \
            $DRY_FLAG $START_FLAG $END_FLAG \
            | tee enrichment_daily.log
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-daily-log
          path: enrichment_daily.log
          if-no-files-found: ignore
