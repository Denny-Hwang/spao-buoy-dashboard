name: Hourly Enrichment (Open-Meteo)

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without writing to Sheets'
        default: 'false'

# Share the ``enrichment-write`` serializer with the daily / derived
# workflows so at most one writer touches the Sheet at a time.
concurrency:
  group: enrichment-write
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements-cron.txt
      - env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
        run: |
          set -euo pipefail
          DRY_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/backfill_enrichment.py \
            --sources open_meteo_marine,open_meteo_historical \
            $DRY_FLAG
